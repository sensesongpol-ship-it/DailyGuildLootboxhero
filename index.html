<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตารางคำนวณคะแนนรายวัน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0eeea;
            --border: #e0ddd6;
            --border2: #ccc9c0;
            --text: #1a1916;
            --text2: #6b6860;
            --text3: #9b9890;
            --radius: 12px;
            --radius-sm: 8px;
        }
        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem 0.75rem 3rem;
            -webkit-tap-highlight-color: transparent;
        }
        .page { max-width: 960px; margin: 0 auto }
        .profile-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .profile-row { display: flex; gap: 8px; align-items: center; }
        .profile-select {
            flex: 1; padding: 8px 12px;
            border-radius: var(--radius-sm); border: 1px solid var(--border2);
            background: var(--surface); font-family: inherit; font-size: 13px; color: var(--text);
        }
        .input-profile-name {
            flex: 1; padding: 8px 12px;
            border-radius: var(--radius-sm); border: 1px solid var(--border2);
            font-family: inherit; font-size: 13px;
        }
        .io-actions-row { display: flex; gap: 8px; width: 100%; }
        .io-actions-row .btn { flex: 1; justify-content: center; font-size: 11px; padding: 8px; }
        .btn-io-export { background: #4a148c; color: #fff; border-color: #4a148c; }
        .btn-io-import { background: #2e7d32; color: #fff; border-color: #2e7d32; }

        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem; gap: 12px; flex-wrap: wrap;
        }
        .page-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em }
        .top-actions { display: flex; gap: 6px; flex-wrap: wrap; width: 100% }
        .top-actions .btn { flex: 1; justify-content: center; text-align: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-family: inherit; font-weight: 500;
            padding: 9px 12px; border-radius: var(--radius-sm);
            border: 1px solid var(--border2); background: var(--surface);
            color: var(--text2); cursor: pointer; transition: all 0.1s; white-space: nowrap;
        }
        .btn:active { background: var(--surface2) }
        .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
        .btn-danger { background: #b71c1c; color: #fff; border-color: #b71c1c; }
        .btn svg { width: 14px; height: 14px; flex-shrink: 0 }

        .banner {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1rem 1.25rem;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem; gap: 12px;
        }
        .banner-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; font-weight: 500; text-transform: uppercase }
        .banner-score { font-size: 28px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums }
        .banner-right { text-align: right }
        .banner-sub { font-size: 11px; color: var(--text3); margin-top: 2px }

        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 12px; margin-bottom: 1rem }
        .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .day-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .day-name { font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 7px }
        .day-total { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); font-variant-numeric: tabular-nums }
        .hd-tue { background: #b71c1c }
        .hd-wed { background: #bf360c }
        .hd-thu { background: #4a148c }
        .hd-fri { background: #0d47a1 }
        .hd-sat { background: #1b5e20 }
        .hd-sun { background: #004d40 }

        .items-list { padding: 4px 0 }
        .item-row { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--bg); }
        .item-row:last-child { border-bottom: none }
        .dot { width: 6px; height: 6px; border-radius: 50%; grid-column: 1 }
        .dot-yellow { background: #f9a825 }
        .dot-orange { background: #d84315 }
        .dot-cyan { background: #00838f }
        .dot-green { background: #2e7d32 }
        .dot-none { background: transparent }
        .item-main { grid-column: 2; display: flex; flex-direction: column; min-width: 0; }
        .item-label { font-size: 12px; color: var(--text); line-height: 1.3; word-break: break-word }
        .item-pts { font-size: 10px; color: var(--text3); font-variant-numeric: tabular-nums; margin-top: 1px }
        .counter { display: flex; align-items: center; gap: 4px; grid-column: 3; justify-self: end }
        
        .btn-c {
            width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%;
            background: var(--surface2); cursor: pointer; font-size: 18px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            color: var(--text2); user-select: none;
        }
        .btn-c:active { background: var(--border); color: var(--text) }
        .cnt-input {
            width: 46px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--surface2); text-align: center; font-size: 13px; font-weight: 600;
            color: var(--text); font-family: inherit; padding: 0; font-variant-numeric: tabular-nums;
        }
        .item-sub { grid-column: 4; font-size: 11px; min-width: 52px; text-align: right; color: var(--text3); font-variant-numeric: tabular-nums }
        .sub-active { color: var(--text); font-weight: 600 }

        .note, .note1 {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 12px 14px;
            font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 12px;
        }
        .note strong, .note1 strong { color: var(--text); font-weight: 600 }

        .legend {
            display: flex; gap: 10px 14px; flex-wrap: wrap; margin-bottom: 1rem;
            font-size: 11px; color: var(--text3); align-items: center; padding: 0 4px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px }
        .legend-dot { width: 8px; height: 8px; border-radius: 50% }

        .scan-section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem;
        }
        .scan-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .scan-status-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
        .scan-status-badge.ready { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .scan-status-badge.loading { background: #fff8e1; color: #f9a825; border-color: #ffe082; }

        .upload-zone {
            border: 2px dashed var(--border2); border-radius: var(--radius-sm);
            padding: 24px; text-align: center; cursor: pointer; background: var(--bg); position: relative;
        }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .upload-zone-icon { font-size: 32px; margin-bottom: 8px; }
        .upload-zone-text { font-size: 13px; color: var(--text2); }

        .scan-preview-wrap { margin-top: 12px; display: none; }
        .scan-preview-wrap.show { display: block; }
        .scan-preview-img { max-width: 100%; max-height: 260px; border-radius: var(--radius-sm); border: 1px solid var(--border); display: block; margin: 0 auto 10px; }
        .btn-scan { background: #00838f; color: #fff; border-color: #00838f; font-size: 13px; padding: 12px 20px; width: 100%; justify-content: center; }

        .scan-progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 10px; overflow: hidden; display: none; }
        .scan-progress-bar.show { display: block; }
        .scan-progress-fill { height: 100%; background: #00838f; border-radius: 3px; width: 0%; transition: width 0.1s; }

        .detection-results { margin-top: 16px; display: none; }
        .detection-results.show { display: block; }
        .detection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .detection-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; display: flex; align-items: center; }
        .detection-card-img { width: 64px; height: 64px; object-fit: contain; background: var(--bg); padding: 6px; }
        .detection-card-body { flex: 1; padding: 8px 10px; min-width: 0; }
        .detection-card-name { font-size: 11.5px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .detection-card-count-row { display: flex; align-items: center; gap: 4px; }
        .detection-card-count-input { width: 44px; height: 26px; border: 1px solid var(--border); border-radius: 6px; text-align: center; font-size: 13px; font-weight: 700; }
        .detection-card-confidence { font-size: 10px; color: #00838f; margin-top: 3px; }
        .detection-card.not-found { opacity: 0.45; }

        .scan-log { margin-top: 10px; font-size: 11px; color: var(--text2); background: var(--bg); border-radius: var(--radius-sm); padding: 8px 12px; line-height: 1.8; max-height: 150px; overflow-y: auto; display: none; }
        .scan-log.show { display: block; }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div class="page-title">ตารางคำนวณคะแนนรายวัน</div>
            <div class="top-actions">
                <button class="btn" onclick="resetAll()">รีเซ็ตแต้ม</button>
                <button class="btn btn-primary" onclick="downloadHTML()">สำรองไฟล์ HTML</button>
            </div>
        </div>

        <div class="profile-section">
            <div class="profile-row">
                <span>โปรไฟล์:</span>
                <select class="profile-select" id="profile-select" onchange="switchProfile(this.value)"></select>
                <button class="btn btn-danger" onclick="deleteProfile()">ลบ</button>
            </div>
            <div class="profile-row">
                <input type="text" class="input-profile-name" id="new-profile-name" placeholder="ชื่อโปรไฟล์ใหม่...">
                <button class="btn" onclick="createNewProfile()">+ สร้างใหม่</button>
            </div>
        </div>

        <div class="banner">
            <div>
                <div class="banner-label">คะแนนรวมทั้งหมด</div>
                <div class="banner-score" id="grand-total">0</div>
            </div>
            <div class="banner-right">
                <div class="banner-sub" id="active-days">—</div>
            </div>
        </div>

        <div class="scan-section">
            <div class="scan-title">
                🔍 ระบบสแกนและคำนวณค่าจากหน้าจอคลัง (ปรับปรุงโครงสร้าง)
                <span class="scan-status-badge loading" id="cv-status">กำลังเปิดระบบประมวลผล...</span>
            </div>
            <div class="upload-zone" id="upload-zone">
                <input type="file" id="scan-file-input" accept="image/*" onchange="onScanImageSelected(event)">
                <div class="upload-zone-icon">📸</div>
                <div class="upload-zone-text">เลือกรูปภาพสกรีนช็อตหน้าคลังเก็บของในเกม</div>
            </div>
            <div class="scan-preview-wrap" id="scan-preview-wrap">
                <img id="scan-preview-img" class="scan-preview-img" src="" alt="Preview">
                <button class="btn btn-scan" id="btn-do-scan" onclick="doScan()" disabled>🔍 เริ่มกระบวนการวิเคราะห์พิกเซลภาพ</button>
                <div class="scan-progress-bar" id="scan-progress-bar">
                    <div class="scan-progress-fill" id="scan-progress-fill"></div>
                </div>
            </div>
            <div class="detection-results" id="detection-results">
                <div class="detection-results-title">📦 ข้อมูลไอเทมที่ตรวจพบและซิงค์เข้าตารางแล้ว:</div>
                <div class="detection-grid" id="detection-grid"></div>
            </div>
            <div class="scan-log" id="scan-log"></div>
        </div>

        <div class="days-grid" id="days-grid"></div>
    </div>

    <script>
        const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/sensesongpol-ship-it/DailyGuildLootboxhero/main/";

        const templateDefs = [
            { file: "BlessingRoy.JPG",    name: "คุ้มครองลอย", mappedLabels: ["ใช้การคุ้มครองลอย 1 ชิ้น"] },
            { file: "CrystalRed.JPG",     name: "ส่งคริสตัล 10 เม็ด", mappedLabels: ["ส่งคริสตัล 10 เม็ด ให้กับปราชญ์", "ส่งคริสตัลพลัง 10 เม็ด ให้กับปริญญ์"] },
            { file: "GoldenKey.JPG",       name: "กุญแจทอง", mappedLabels: ["ใช้กุญแจทอง 1 ดอก"] },
            { file: "GuildBlueCoin.JPG",   name: "เหรียญกิลด์คริสตัลฟ้า", mappedLabels: ["ใช้เหรียญกิลด์คริสตัลฟ้า 1 เหรียญ", "เหรียญกิลด์คริสตัลฟ้า 1 เหรียญ"] },
            { file: "GuildCoin.JPG",       name: "เหรียญกิลด์", mappedLabels: ["ใช้เหรียญกิลด์ 1000 เหรียญ"] },
            { file: "HammerRelic.JPG",     name: "โบราณคดีโบราณวัตถุ", mappedLabels: ["โบราณคดีโบราณวัตถุ 1 ครั้ง"] },
            { file: "PotionGh.JPG",        name: "ยาวิญญาณเวท", mappedLabels: ["ใช้ยาวิญญาณเวท 1 ขวด"] },
            { file: "Rune.JPG",            name: "อัญเชิญรูน", mappedLabels: ["อัญเชิญรูน 1 ครั้ง"] },
        ];

        let loadedTemplates = {};
        let cvReady = false;
        let scanImageElement = null;
        let detectionCounts = {};
        let ocrWorker = null;

        function onOpenCvReady() {
            cvReady = true;
            const badge = document.getElementById("cv-status");
            badge.textContent = "OpenCV Engine Online";
            badge.className = "scan-status-badge ready";
            preloadTemplates();
        }

        async function preloadTemplates() {
            for (let t of templateDefs) {
                await new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => { loadedTemplates[t.file] = img; resolve(true); };
                    img.onerror = () => {
                        // ป้องกันปัญหานามสกุลไฟล์เล็กใหญ่บน GitHub ล่มระบบ
                        const retryImg = new Image();
                        retryImg.crossOrigin = "anonymous";
                        retryImg.onload = () => { loadedTemplates[t.file] = retryImg; resolve(true); };
                        retryImg.onerror = () => {
                            const canvas = document.createElement("canvas");
                            canvas.width = 60; canvas.height = 60;
                            loadedTemplates[t.file] = canvas;
                            resolve(false);
                        };
                        retryImg.src = GITHUB_RAW_BASE + t.file.toLowerCase().replace("jpg", "jpg");
                    };
                    img.src = GITHUB_RAW_BASE + t.file;
                });
            }
        }

        function onScanImageSelected(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    scanImageElement = img;
                    document.getElementById("scan-preview-img").src = e.target.result;
                    document.getElementById("scan-preview-wrap").classList.add("show");
                    document.getElementById("btn-do-scan").disabled = !cvReady;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function getOcrWorker() {
            if (ocrWorker) return ocrWorker;
            ocrWorker = await Tesseract.createWorker('eng', 1, { logger: () => {} });
            await ocrWorker.setParameters({
                tessedit_char_whitelist: '0123456789.KkMm',
                tessedit_pageseg_mode: '7',
            });
            return ocrWorker;
        }

        function parseOcrNumber(text) {
            if (!text) return 0;
            let clean = text.replace(/\s/g, '').replace(/[Oo]/g, '0').replace(/[Il|]/g, '1');
            const km = clean.match(/(\d[\d.]*)([KkMm])/);
            if (km) {
                const base = parseFloat(km[1]);
                return Math.round(base * (km[2].toLowerCase() === 'k' ? 1000 : 1000000));
            }
            const nums = clean.match(/\d+/g);
            return nums ? (parseInt(nums.sort((a, b) => b.length - a.length)[0], 10) || 0) : 0;
        }

        // ประมวลผลล้างขอบพิกเซลตัวเลขให้ Tesseract อ่านได้ 100% ไม่ติดขยะจากสีส้มของช่องคลัง
        function preprocessNumberCrop(srcCanvas, rx, ry, rw, rh) {
            const canvas = document.createElement('canvas');
            canvas.width = rw * 4; canvas.height = rh * 4;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(srcCanvas, rx, ry, rw, rh, 0, 0, canvas.width, canvas.height);
            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                let dst = new cv.Mat();
                // ปรับเกณฑ์ความสว่างให้เข้มคมชัด ตัดเงาซ้อนขอบตัวอักษรหนา ๆ ออก
                cv.threshold(gray, dst, 145, 255, cv.THRESH_BINARY_INV);
                cv.imshow(canvas, dst);
                src.delete(); gray.delete(); dst.delete();
            } catch (e) {}
            return canvas;
        }

        // ตัดขอบแถบดำ (Black Bars Top/Bottom) อัตโนมัติเพื่อคืนค่าสัดส่วนหน้าจอมือถือที่แท้จริง
        function removeBlackBars(srcMat) {
            let gray = new cv.Mat();
            cv.cvtColor(srcMat, gray, cv.COLOR_RGBA2GRAY, 0);
            let rowProj = new cv.Mat();
            cv.reduce(gray, rowProj, 1, cv.REDUCE_AVG, cv.CV_8U);
            
            let top = 0;
            let bottom = srcMat.rows - 1;
            const thresh = 15; // เกณฑ์ความมืดของแถบดำข้างจอ
            
            for (let r = 0; r < srcMat.rows; r++) {
                if (rowProj.data[r] > thresh) { top = r; break; }
            }
            for (let r = srcMat.rows - 1; r >= 0; r--) {
                if (rowProj.data[r] > thresh) { bottom = r; break; }
            }
            
            gray.delete(); rowProj.delete();
            if (bottom > top && (top > 0 || bottom < srcMat.rows - 1)) {
                let rect = new cv.Rect(0, top, srcMat.cols, (bottom - top) + 1);
                return srcMat.roi(rect);
            }
            return srcMat.clone();
        }

        async function doScan() {
            if (!cvReady || !scanImageElement) return;
            const btn = document.getElementById("btn-do-scan");
            btn.disabled = true;
            btn.textContent = "⏳ กำลังคำนวณสัดส่วนหน้าจอคลังไอเทม...";
            
            const progressBar = document.getElementById("scan-progress-bar");
            const progressFill = document.getElementById("scan-progress-fill");
            progressBar.classList.add("show");

            await new Promise(r => setTimeout(r, 40));

            // โหลดสัดส่วนภาพเข้าบอร์ด OpenCV
            let rawSrc = cv.imread(scanImageElement);
            let srcMat = removeBlackBars(rawSrc);
            rawSrc.delete();

            // วาดเนื้อหาที่คัตเอ้าท์แล้วลง Canvas กลางเพื่อทำ OCR พิกัดพิกเซล
            const srcCanvas = document.createElement("canvas");
            srcCanvas.width = srcMat.cols; srcCanvas.height = srcMat.rows;
            cv.imshow(srcCanvas, srcMat);

            let srcGray = new cv.Mat();
            cv.cvtColor(srcMat, srcGray, cv.COLOR_RGBA2GRAY, 0);

            let logLines = [];
            const total = templateDefs.length;

            for (let ti = 0; ti < total; ti++) {
                const tDef = templateDefs[ti];
                progressFill.style.width = Math.round((ti / total) * 100) + "%";
                btn.textContent = `⏳ วิเคราะห์พิกเซลโครงสร้างพื้นที่: ${tDef.name}`;
                await new Promise(r => setTimeout(r, 20));

                const tmplImg = loadedTemplates[tDef.file];
                if (!tmplImg || (tmplImg instanceof HTMLCanvasElement && tmplImg.width === 60)) {
                    logLines.push(`<span>✗ ไม่สามารถดึงฐานข้อมูลรูปภาพชิ้นหลักของ [${tDef.name}] ได้</span>`);
                    continue;
                }

                let tmplMat = cv.imread(tmplImg);
                let tmplGray = new cv.Mat();
                cv.cvtColor(tmplMat, tmplGray, cv.COLOR_RGBA2GRAY, 0);

                // พัฒนา: โฟกัสจับคู่เฉพาะ "ครึ่งบนของไอเทม" เพื่อเลี่ยงพื้นที่จุดทับถมของข้อความตัวเลขด้านล่าง
                let cropRect = new cv.Rect(0, 0, tmplGray.cols, Math.round(tmplGray.rows * 0.55));
                let tmplFocused = tmplGray.roi(cropRect);

                // ตั้งช่วงสเกลการสแกนความละเอียดให้ถี่และแม่นยำขึ้นสำหรับจอมือถือสัดส่วนยาวพิเศษ
                const searchScales = [0.35, 0.5, 0.65, 0.8, 1.0, 1.2, 1.35];
                let bestVal = -Infinity;
                let bestMatch = null;
                let finalW = 0, finalH = 0;

                for (let scale of searchScales) {
                    let tw = Math.round(tmplFocused.cols * scale);
                    let th = Math.round(tmplFocused.rows * scale);
                    if (tw > srcGray.cols || th > srcGray.rows || tw < 10 || th < 10) continue;

                    let resizedTmpl = new cv.Mat();
                    cv.resize(tmplFocused, resizedTmpl, new cv.Size(tw, th), 0, 0, cv.INTER_LINEAR);

                    let matchResult = new cv.Mat();
                    cv.matchTemplate(srcGray, resizedTmpl, matchResult, cv.TM_CCOEFF_NORMED);

                    let minMax = cv.minMaxLoc(matchResult);
                    if (minMax.maxVal > bestVal) {
                        bestVal = minMax.maxVal;
                        // ปรับเกณฑ์ความยืดหยุ่นลงมาเหลือ 0.53 เพื่อให้จับคู่ไอเทมที่โดนเลขบังเยอะๆ ได้สำเร็จ
                        if (minMax.maxVal >= 0.53) {
                            bestMatch = { x: minMax.maxLoc.x, y: minMax.maxLoc.y };
                            finalW = Math.round(tmplGray.cols * scale);
                            finalH = Math.round(tmplGray.rows * scale);
                        }
                    }
                    resizedTmpl.delete(); matchResult.delete();
                }

                tmplMat.delete(); tmplGray.delete(); tmplFocused.delete();

                if (bestMatch) {
                    // กำหนดพิกัดครอปช่องตัวเลขจำนวนชิ้นไอเทมในแต่ละบล็อกช่องเก็บของ
                    let numX = bestMatch.x + Math.round(finalW * 0.15);
                    let numY = bestMatch.y + Math.round(finalH * 1.25); 
                    let numW = Math.round(finalW * 0.82);
                    let numH = Math.round(finalH * 0.52);

                    const processedCanvas = preprocessNumberCrop(srcCanvas, numX, numY, numW, numH);
                    const worker = await getOcrWorker();
                    const { data: { text } } = await worker.recognize(processedCanvas);
                    
                    let finalCount = parseOcrNumber(text);
                    if (finalCount === 0) finalCount = 1; // ค่า Default หากเจอกล่องแต่ไม่มีตัวเลขระบุกำกับชิ้น

                    detectionCounts[tDef.file] = finalCount;
                    syncDetectedCountToApp(tDef, finalCount);
                    logLines.push(`<span class="log-found">✓ ตรวจเจอไอเทม [${tDef.name}] จำนวนแอปซิงค์ ${finalCount.toLocaleString()} ชิ้น (ความเสถียรพิกเซล ${(bestVal*100).toFixed(0)}%)</span>`);
                } else {
                    detectionCounts[tDef.file] = 0;
                    logLines.push(`<span class="log-notfound">✗ ค้นหาพื้นที่ไอคอนของ [${tDef.name}] ไม่พบบนตารางช่องเก็บของ</span>`);
                }
            }

            srcMat.delete(); srcGray.delete();
            progressFill.style.width = "100%";
            renderDetectionCards();

            document.getElementById("scan-log").innerHTML = logLines.join("<br>");
            document.getElementById("scan-log").classList.add("show");
            document.getElementById("detection-results").classList.add("show");

            btn.disabled = false;
            btn.textContent = "🔍 วิเคราะห์และสแกนหน้าคลังสินค้าอีกครั้ง";
            render();
        }

        function syncDetectedCountToApp(tmplDef, value) {
            const counts = getCounts();
            daysData.forEach(day => {
                day.items.forEach((item, idx) => {
                    if (tmplDef.mappedLabels.includes(item.label)) {
                        const key = day.id + "_" + idx;
                        if (item.label === "ใช้เหรียญกิลด์ 1000 เหรียญ") {
                            counts[key] = Math.floor(value / 1000);
                        } else {
                            counts[key] = value;
                        }
                    }
                });
            });
            saveToStorage();
        }

                card.className = "detection-card" + (count === 0 ? " not-found" : "");
                card.innerHTML = `
                    <img class="detection-card-img" src="${imgSrc}" onerror="this.style.display='none'">
                    <div class="detection-card-body">
                        <div class="detection-card-name">${tDef.name}</div>
                        <div class="detection-card-count-row">
                            <input class="detection-card-count-input" type="number" value="${count}" readonly>
                            <span>ชิ้น</span>
                        </div>
                        <div class="detection-card-confidence">
                            ${count > 0 ? `🟢 ตรวจพบและบันทึกเรียบร้อย` : "⚪ ไม่พบในรูปคลังสินค้า"}

                    </div>

                grid.appendChild(card);

        let appState = { currentProfile: "Default", profiles: { "Default": {} } };
        function dotClass(c) { return c==="yellow"?"dot dot-yellow":c==="orange"?"dot dot-orange":c==="cyan"?"dot dot-cyan":c==="green"?"dot dot-green":"dot dot-none"; }
        function loadFromStorage() { const saved = localStorage.getItem("daily_score_app_data"); if (saved) { try { appState = JSON.parse(saved); } catch(e) {} } }
        function saveToStorage() { localStorage.setItem("daily_score_app_data", JSON.stringify(appState)); }
        function getCounts() { return appState.profiles[appState.currentProfile] || {}; }
        function getGrand() { let g = 0; const c = getCounts(); daysData.forEach(d => d.items.forEach((it,i) => g += (c[d.id+"_"+i]||0)*it.pts)); return g; }
        function getDayTotal(day) { let t = 0; const c = getCounts(); day.items.forEach((_,i) => t += (c[day.id+"_"+i]||0)*day.items[i].pts); return t; }
        
        function render() {
            const grid = document.getElementById("days-grid");
            grid.innerHTML = ""; const counts = getCounts();
            daysData.forEach(day => {
                const card = document.createElement("div");
                card.className = "day-card"; let rows = "";
                day.items.forEach((item, idx) => {
                    const key = day.id+"_"+idx; if (!counts[key]) counts[key] = 0;
                    const sub = counts[key]*item.pts;
                    rows += `<div class="item-row">
                        <div class="${dotClass(item.color)}"></div>
                        <div class="item-main"><span class="item-label">${item.label}</span><span class="item-pts">${fmt(item.pts)} แต้ม</span></div>
                        <div class="counter">
                          <button class="btn-c" onclick="change('${key}','${day.id}',-1)">−</button>
                          <input class="cnt-input" id="cnt_${key}" type="number" pattern="[0-9]*" inputmode="numeric" value="${counts[key]}" onchange="handleInput('${key}','${day.id}')">
                          <button class="btn-c" onclick="change('${key}','${day.id}',1)">+</button>
                        </div>
                        <span class="item-sub${sub>0?' sub-active':''}" id="sub_${key}">${sub>0?fmt(sub):"—"}</span>
                      </div>`;
                });
                card.innerHTML = `<div class="day-header ${day.cls}"><span class="day-name">${day.name}</span><span class="day-total" id="dtotal_${day.id}">${fmt(getDayTotal(day))} คะแนน</span></div><div class="items-list">${rows}</div>`;
                grid.appendChild(card);
            });
            const grand = getGrand();
            document.getElementById("grand-total").textContent = fmt(grand);
            const active = daysData.filter(d=>getDayTotal(d)>0).map(d=>d.name).join(", ");
            document.getElementById("active-days").textContent = active ? "วันที่บันทึก: "+active : "ยังไม่ได้กรอกข้อมูล";
        }

        function change(key, dayId, delta) { const counts = getCounts(); counts[key] = Math.max(0, (counts[key]||0)+delta); updateItem(key, dayId); }
        function handleInput(key, dayId) { const v = parseInt(document.getElementById("cnt_"+key).value)||0; const counts = getCounts(); counts[key] = Math.max(0,v); updateItem(key, dayId); }
        function updateItem(key, dayId) { saveToStorage(); render(); }
        function resetAll() { if (confirm("รีเซ็ตคะแนนของโปรไฟล์นี้ทั้งหมด?")) { const counts = getCounts(); Object.keys(counts).forEach(k => counts[k] = 0); saveToStorage(); render(); } }
